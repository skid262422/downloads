<!-- ========================================= -->
<!-- SAVE SYSTEM -->
<!-- ========================================= -->

<script>

function saveGame(data) {

    localStorage.setItem(
        "gamemaker_save",
        JSON.stringify(data)
    );

    console.log("Game Saved");
}

function loadGame() {

    const save =
        localStorage.getItem("gamemaker_save");

    if (save) {

        console.log("Save Loaded");

        return JSON.parse(save);
    }

    console.log("No Save Found");

    return null;
}

function deleteSave() {

    localStorage.removeItem("gamemaker_save");

    console.log("Save Deleted");
}

/* TEST SAVE */

saveGame({
    coins: 5000,
    level: 8,
    unlocked: true
});

console.log(loadGame());

</script>
